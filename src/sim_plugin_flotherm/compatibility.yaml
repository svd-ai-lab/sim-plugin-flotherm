# sim-cli — Simcenter Flotherm driver compatibility matrix.
#
# Flotherm has NO Python binding. Execution happens via flotherm.bat /
# floserv.exe + GUI automation that "plays" FloSCRIPT XML macros.
#
# Detection inputs (see driver.py detect_installed):
#   - FLOTHERM_ROOT env var
#   - shutil.which("flotherm")
#   - C:\Program Files (x86)\Siemens\SimcenterFlotherm\<YYMM>\WinXP\bin\
#
# Version normalization: Siemens uses YYMM release codes (2504 = 2025
# April). We use them as-is in solver_versions.

driver: flotherm
# (no sdk_package — Flotherm has no Python wrapper)

profiles:

  - name: flotherm_2504
    solver_versions: ["2504"]
    active_solver_layer: "2504"
    notes: |
      Simcenter Flotherm 2504 (2025.1). Latest tested.

  - name: flotherm_2412
    solver_versions: ["2412"]
    active_solver_layer: "2412"
    notes: |
      Simcenter Flotherm 2412 (2024.4).

  - name: flotherm_2410
    solver_versions: ["2410"]
    active_solver_layer: "2410"
    notes: |
      Simcenter Flotherm 2410 (2024.3). Tested 2026-04-12 on
      DESKTOP-623UBP1. Headless translator.exe + solexe.exe path
      crashes with 0xC0000005 (same as 2504 on this machine — see
      sim-cli#14). GUI automation via feat/flotherm-gui-automation
      branch works.

  - name: flotherm_2406
    solver_versions: ["2406"]
    active_solver_layer: "2406"
    notes: |
      Simcenter Flotherm 2406 (2024.2).
